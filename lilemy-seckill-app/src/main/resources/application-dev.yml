spring:
  # 本地开发环境 MySQL 数据源配置
  datasource:
    # 连接地址
    url: jdbc:mysql://localhost:3306/lilemy_seckill?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    # 数据库用户名
    username: root
    # 数据库密码
    password: 123456
    # 数据库驱动类名
    driver-class-name: com.mysql.cj.jdbc.Driver
    # HikariCP 连接池配置
    hikari:
      # 连接池名称
      pool-name: SeckillHikariPool
      # 最小空闲连接数
      minimum-idle: 10
      # 最大连接数
      maximum-pool-size: 50
      # 空闲连接超时时间（毫秒）
      idle-timeout: 300000
      # 连接最大存活时间（毫秒）
      max-lifetime: 900000
      # 获取连接超时时间（毫秒）
      connection-timeout: 30000
      # 连接测试语句
      connection-test-query: SELECT 1
    # Redis 配置
  data:
    redis:
      # Redis 服务器地址
      host: 127.0.0.1
      # Redis 服务器端口
      port: 6379
      # Redis 密码（默认为空，如果设置了密码请填写）
      password: 123456
      # 使用的数据库索引（默认 0）
      database: 0
      # 连接超时时间（毫秒）
      timeout: 5000
      # Lettuce 连接池配置（提升连接复用效率）
      lettuce:
        pool:
          # 连接池最大连接数
          max-active: 20
          # 连接池最大空闲连接数
          max-idle: 10
          # 连接池最小空闲连接数
          min-idle: 5
          # 连接池最大阻塞等待时间（毫秒），-1 表示无限制
          max-wait: 3000
# 自定义线程池配置
thread-pool:
  # 核心线程数
  core-pool-size: 2
  # 最大线程数
  max-pool-size: 5
  # 队列容量
  queue-capacity: 100
  # 空闲线程存活时间（秒）
  keep-alive-seconds: 60
