spring:
  # 本地开发环境 MySQL 数据源配置
  datasource:
    # 连接地址
    url: jdbc:mysql://localhost:3306/lilemy_seckill?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    # 数据库用户名
    username: root
    # 数据库密码
    password: 123456
    # 数据库驱动类名
    driver-class-name: com.mysql.cj.jdbc.Driver
    # HikariCP 连接池配置
    hikari:
      # 连接池名称
      pool-name: SeckillHikariPool
      # 最小空闲连接数
      minimum-idle: 10
      # 最大连接数
      maximum-pool-size: 50
      # 空闲连接超时时间（毫秒）
      idle-timeout: 300000
      # 连接最大存活时间（毫秒）
      max-lifetime: 900000
      # 获取连接超时时间（毫秒）
      connection-timeout: 30000
      # 连接测试语句
      connection-test-query: SELECT 1